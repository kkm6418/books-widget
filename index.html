<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Books read this year</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: transparent;
    color: #1a1a1a;
  }
  body {
    padding: 10px 12px;
  }
  .card {
    max-width: 100%;
    margin: 0 auto;
  }
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .label {
    font-size: 11px;
    color: #6b6b6b;
    margin: 0;
  }
  .count {
    font-size: 24px;
    font-weight: 600;
    margin: 2px 0 0;
    line-height: 1;
  }
  .refresh {
    background: none;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    cursor: pointer;
    color: #444;
  }
  .refresh:hover { background: #f5f5f5; }
  .list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 160px;
    overflow-y: auto;
  }
  .row {
    display: flex;
    justify-content: space-between;
    padding: 5px 8px;
    border: 1px solid #eee;
    border-radius: 6px;
    font-size: 12px;
  }
  .row span:first-child {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .row span:last-child {
    color: #888;
    font-size: 11px;
    white-space: nowrap;
    margin-left: 8px;
    flex-shrink: 0;
  }
  .empty, .error {
    font-size: 11px;
    color: #888;
    text-align: center;
    padding: 12px 0;
  }
  .error { color: #b3261e; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div>
    <button class="refresh" id="refresh-btn">Refresh</button>
    </div>
     <p class="label" id="year-label">Books read this year</p>
      <p class="count" id="count">–</p>
  </div>
  <div class="list" id="list"></div>
</div>

<script>
  const API_URL = "/api/count";

  async function load() {
    const countEl = document.getElementById("count");
    const listEl = document.getElementById("list");
    const yearLabel = document.getElementById("year-label");
    listEl.innerHTML = '<p class="empty">Loading…</p>';

    try {
      const res = await fetch(API_URL);
      const data = await res.json();

      if (data.error) {
        listEl.innerHTML = '<p class="error">' + data.error + "</p>";
        return;
      }

      yearLabel.textContent = "Books read in " + data.year;
      countEl.textContent = data.count;
      listEl.innerHTML = "";

      if (data.books.length === 0) {
        listEl.innerHTML = '<p class="empty">No books finished yet this year.</p>';
        return;
      }

      data.books.slice().reverse().forEach((book) => {
        const row = document.createElement("div");
        row.className = "row";
        const dateStr = book.dateFinished
          ? new Date(book.dateFinished + "T00:00:00").toLocaleDateString("en-US", {
              month: "short",
              day: "numeric"
            })
          : "";
        row.innerHTML =
          "<span>" + escapeHtml(book.title) + "</span><span>" + dateStr + "</span>";
        listEl.appendChild(row);
      });
    } catch (err) {
      listEl.innerHTML = '<p class="error">Could not load data.</p>';
    }
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  document.getElementById("refresh-btn").addEventListener("click", load);
  load();
</script>
</body>
</html>
